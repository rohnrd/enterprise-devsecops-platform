trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

variables:
  vmImageName: 'ubuntu-latest'
  imageRepository: 'enterprise-devsecops-platform'
  dockerfilePath: 'sample-app/Dockerfile'
  tag: '$(Build.BuildId)'
  artifactName: 'drop'

stages:
  - stage: Code_Validation
    displayName: 'Code Validation and Security Checks'
    jobs:
      - job: SAST_and_SCA
        displayName: 'Run SAST and SCA'
        pool:
          vmImage: $(vmImageName)

        steps:
          - checkout: self
            fetchDepth: 0

          - task: Bash@3
            displayName: 'Show build context'
            inputs:
              targetType: 'inline'
              script: |
                echo "Build ID: $(Build.BuildId)"
                echo "Branch: $(Build.SourceBranchName)"
                echo "Repository: $(Build.Repository.Name)"

          - task: Bash@3
            displayName: 'Run SAST scan'
            inputs:
              targetType: 'inline'
              script: |
                echo "Running SAST scan..."
                mkdir -p reports/sast
                echo "Sample SAST result - no critical issues found" > reports/sast/sast-report.txt

          - task: Bash@3
            displayName: 'Run SCA scan'
            inputs:
              targetType: 'inline'
              script: |
                echo "Running Software Composition Analysis..."
                mkdir -p reports/sca
                echo "Sample SCA result - dependencies validated" > reports/sca/sca-report.txt

          - task: PublishBuildArtifacts@1
            displayName: 'Publish security scan reports'
            inputs:
              PathtoPublish: 'reports'
              ArtifactName: 'security-reports'
              publishLocation: 'Container'

  - stage: Build
    displayName: 'Build Application and Artifact'
    dependsOn: Code_Validation
    condition: succeeded()
    jobs:
      - job: Build_App
        displayName: 'Build sample application'
        pool:
          vmImage: $(vmImageName)

        steps:
          - checkout: self

          - task: Bash@3
            displayName: 'Build application'
            inputs:
              targetType: 'inline'
              script: |
                echo "Building application..."
                mkdir -p build-output
                echo "Sample build artifact created on $(date)" > build-output/app-package.txt

          - task: PublishBuildArtifacts@1
            displayName: 'Publish build artifact'
            inputs:
              PathtoPublish: 'build-output'
              ArtifactName: $(artifactName)
              publishLocation: 'Container'

  - stage: Container_and_IaC_Security
    displayName: 'Container Build, Image Scan, and IaC Scan'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: Container_Security
        displayName: 'Container and IaC validation'
        pool:
          vmImage: $(vmImageName)

        steps:
          - checkout: self

          - task: Bash@3
            displayName: 'Build container image'
            inputs:
              targetType: 'inline'
              script: |
                echo "Building Docker image..."
                echo "docker build -f $(dockerfilePath) -t $(imageRepository):$(tag) ."
                mkdir -p reports/container
                echo "Container image $(imageRepository):$(tag) built successfully" > reports/container/image-build.txt

          - task: Bash@3
            displayName: 'Run container image scan'
            inputs:
              targetType: 'inline'
              script: |
                echo "Running container scan..."
                echo "No critical vulnerabilities found" > reports/container/container-scan.txt

          - task: Bash@3
            displayName: 'Run IaC scan'
            inputs:
              targetType: 'inline'
              script: |
                echo "Running IaC scan on Terraform..."
                mkdir -p reports/iac
                echo "Terraform scan passed with secure defaults" > reports/iac/iac-scan.txt

          - task: PublishBuildArtifacts@1
            displayName: 'Publish container and IaC reports'
            inputs:
              PathtoPublish: 'reports'
              ArtifactName: 'container-iac-reports'
              publishLocation: 'Container'

  - stage: Policy_Check
    displayName: 'Policy as Code Validation'
    dependsOn: Container_and_IaC_Security
    condition: succeeded()
    jobs:
      - job: OPA_Policy_Check
        displayName: 'Validate policies'
        pool:
          vmImage: $(vmImageName)

        steps:
          - checkout: self

          - task: Bash@3
            displayName: 'Run OPA policy checks'
            inputs:
              targetType: 'inline'
              script: |
                echo "Evaluating Policy-as-Code rules..."
                mkdir -p reports/policy
                echo "OPA policy validation passed" > reports/policy/policy-report.txt

          - task: PublishBuildArtifacts@1
            displayName: 'Publish policy report'
            inputs:
              PathtoPublish: 'reports'
              ArtifactName: 'policy-reports'
              publishLocation: 'Container'

  - stage: Approval_Gate
    displayName: 'Production Approval Gate'
    dependsOn: Policy_Check
    condition: succeeded()
    jobs:
      - job: Await_Approval
        displayName: 'Manual approval before production deployment'
        pool: server
        steps:
          - task: ManualValidation@0
            timeoutInMinutes: 1440
            inputs:
              notifyUsers: ''
              instructions: |
                Please review the pipeline results, security reports, policy output, and deployment readiness.
                Approve only if all required controls are satisfied.
              onTimeout: 'reject'

  - stage: GitOps_Deployment
    displayName: 'Deploy through ArgoCD'
    dependsOn: Approval_Gate
    condition: succeeded()
    jobs:
      - job: Deploy_with_GitOps
        displayName: 'Update GitOps manifests and deploy'
        pool:
          vmImage: $(vmImageName)

        steps:
          - checkout: self

          - task: Bash@3
            displayName: 'Simulate GitOps manifest update'
            inputs:
              targetType: 'inline'
              script: |
                echo "Updating deployment manifests with image tag $(tag)..."
                mkdir -p gitops-output
                echo "ArgoCD will sync desired state using image tag $(tag)" > gitops-output/gitops-deploy.txt

          - task: PublishBuildArtifacts@1
            displayName: 'Publish GitOps deployment output'
            inputs:
              PathtoPublish: 'gitops-output'
              ArtifactName: 'gitops-output'
              publishLocation: 'Container'

  - stage: Post_Deployment_Validation
    displayName: 'Monitoring and Post-Deployment Validation'
    dependsOn: GitOps_Deployment
    condition: succeeded()
    jobs:
      - job: Validate_Runtime
        displayName: 'Run post-deployment checks'
        pool:
          vmImage: $(vmImageName)

        steps:
          - task: Bash@3
            displayName: 'Run health and monitoring checks'
            inputs:
              targetType: 'inline'
              script: |
                echo "Running post-deployment validation..."
                mkdir -p reports/post-deploy
                echo "Application health check passed" > reports/post-deploy/health-check.txt
                echo "Monitoring integration validated" > reports/post-deploy/monitoring-check.txt

          - task: PublishBuildArtifacts@1
            displayName: 'Publish post-deployment validation results'
            inputs:
              PathtoPublish: 'reports'
              ArtifactName: 'post-deployment-reports'
              publishLocation: 'Container'