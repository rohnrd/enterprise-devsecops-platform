apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: enterprise-devsecops-platform
  namespace: argocd
  labels:
    owner: rajamohan
    project: enterprise-devsecops-platform
spec:
  project: default

  source:
    repoURL: https://github.com/rohnrd/enterprise-devsecops-platform.git
    targetRevision: main
    path: gitops/manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: devsecops-platform

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true