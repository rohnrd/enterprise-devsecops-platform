sonar.projectKey=enterprise-devsecops-platform
sonar.projectName=Enterprise DevSecOps Platform
sonar.projectVersion=1.0

# Source configuration
sonar.sources=sample-app
sonar.sourceEncoding=UTF-8

# Language-specific (adjust based on your app)
sonar.language=js

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**

# Test coverage (optional)
sonar.tests=sample-app
sonar.test.inclusions=**/*.test.js

# Quality gate wait (important)
sonar.qualitygate.wait=true