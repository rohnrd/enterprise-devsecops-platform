name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

permissions:
  id-token: write
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: enterprise-devsecops-platform

jobs:

# --------------------------------
# 1. BUILD + VERSION + SAST
# --------------------------------
  build-and-scan:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔢 Versioning
      - name: Generate Build Version
        id: version
        run: |
          BUILD_NUM=${{ github.run_number }}

          MAJOR=$(( (BUILD_NUM - 1) / 100 + 1 ))
          MINOR=$(( BUILD_NUM % 100 ))

          BASE_VERSION="${MAJOR}.${MINOR}"

          if [ "${{ github.ref_name }}" = "develop" ]; then
            VERSION="${BASE_VERSION}-beta"
          else
            VERSION="${BASE_VERSION}"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      # 🔐 SAST (SonarQube)
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # 📦 Build App
      - name: Build app
        run: |
          cd sample-app
          npm install

      # 📦 Create Artifact
      - name: Create Build Artifact
        run: |
          mkdir -p artifact
          echo "Version: $VERSION" > artifact/build-info.txt
          echo "Commit: ${{ github.sha }}" >> artifact/build-info.txt
          echo "Author: Rajamohan" >> artifact/build-info.txt

      # 📤 Upload Artifact (ONLY main/dev)
      - name: Upload Artifact
        if: github.ref_name == 'main' || github.ref_name == 'develop'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ env.VERSION }}
          path: artifact/

# --------------------------------
# 2. CONTAINER + SCA + PUSH
# --------------------------------
  container-security:
    runs-on: ubuntu-latest
    needs: build-and-scan

    env:
      VERSION: ${{ needs.build-and-scan.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

      # 🔍 SCA Scan
      - name: Trivy FS Scan
        run: |
          trivy fs --severity HIGH,CRITICAL --exit-code 1 .

      # 🐳 Build Image
      - name: Build Docker Image
        run: |
          docker build -t $REGISTRY/${{ github.repository }}:$VERSION sample-app/

      # 🔐 Login GHCR
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 🚀 Push Image
      - name: Push Image
        run: |
          docker push $REGISTRY/${{ github.repository }}:$VERSION

      # 🔍 Container Scan
      - name: Trivy Image Scan
        run: |
          trivy image --exit-code 1 $REGISTRY/${{ github.repository }}:$VERSION

# --------------------------------
# 3. AZURE LOGIN (OIDC)
# --------------------------------
  azure-auth:
    runs-on: ubuntu-latest
    needs: container-security

    steps:
      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure Login
        run: az account show

# --------------------------------
# 4. CD - GITOPS UPDATE + STORE ARTIFACT
# --------------------------------
  gitops-update:
    runs-on: ubuntu-latest
    needs: azure-auth

    env:
      VERSION: ${{ needs.build-and-scan.outputs.version }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 📥 Download Artifact
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ env.VERSION }}
          path: artifact/

      # 📂 Store Artifact in Repo
      - name: Store Artifact in Git
        if: github.ref_name == 'main' || github.ref_name == 'develop'
        run: |
          mkdir -p build-artifacts/${VERSION}
          cp -r artifact/* build-artifacts/${VERSION}/

      # 🔁 Update GitOps Manifest
      - name: Update Deployment Image
        run: |
          sed -i "s|image: .*|image: $REGISTRY/${{ github.repository }}:$VERSION|g" gitops/manifests/deployment.yaml

      # 🚀 Commit & Push
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          git commit -m "Release $VERSION - image update + artifact storage" || echo "No changes"
          git push