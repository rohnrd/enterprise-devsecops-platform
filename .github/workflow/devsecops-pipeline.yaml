name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

permissions:
  id-token: write
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: enterprise-devsecops-platform

jobs:
  build-and-scan:
    name: Build, Version, SAST and Artifact
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Build Version
        id: version
        run: |
          BUILD_NUM=${{ github.run_number }}
          MAJOR=$(( (BUILD_NUM - 1) / 100 + 1 ))
          MINOR=$(( BUILD_NUM % 100 ))

          BASE_VERSION="${MAJOR}.${MINOR}"

          if [ "${{ github.ref_name }}" = "develop" ]; then
            VERSION="${BASE_VERSION}-beta"
          else
            VERSION="${BASE_VERSION}"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Build Node.js app
        run: |
          cd sample-app
          npm install

      - name: Package artifact as .tgz
        run: |
          mkdir -p artifact
          tar \
            --exclude='node_modules' \
            --exclude='npm-debug.log' \
            -czf artifact/enterprise-devsecops-platform-${VERSION}.tgz \
            -C sample-app .

      - name: Create build metadata
        run: |
          echo "Version: $VERSION" > artifact/build-info.txt
          echo "Branch: ${{ github.ref_name }}" >> artifact/build-info.txt
          echo "Commit: ${{ github.sha }}" >> artifact/build-info.txt
          echo "Author: Rajamohan" >> artifact/build-info.txt

      - name: Upload artifact
        if: github.ref_name == 'main' || github.ref_name == 'develop'
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-devsecops-platform-${{ env.VERSION }}
          path: |
            artifact/*.tgz
            artifact/build-info.txt

  container-security:
    name: SCA, Docker Build, GHCR Push and Image Scan
    runs-on: ubuntu-latest
    needs: build-and-scan

    env:
      VERSION: ${{ needs.build-and-scan.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

      - name: Trivy filesystem scan
        run: |
          trivy fs --severity HIGH,CRITICAL --exit-code 1 .

      - name: Build Docker image
        run: |
          docker build -t $REGISTRY/${{ github.repository }}:$VERSION sample-app/

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push Docker image
        run: |
          docker push $REGISTRY/${{ github.repository }}:$VERSION

      - name: Trivy image scan
        run: |
          trivy image --exit-code 1 $REGISTRY/${{ github.repository }}:$VERSION

  azure-auth:
    name: Azure OIDC Login
    runs-on: ubuntu-latest
    needs: container-security

    steps:
      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure Login
        run: az account show

  gitops-update:
    name: GitOps Manifest Update
    runs-on: ubuntu-latest
    needs:
      - build-and-scan
      - azure-auth

    env:
      VERSION: ${{ needs.build-and-scan.outputs.version }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update deployment image
        run: |
          sed -i "s|image: .*|image: $REGISTRY/${{ github.repository }}:$VERSION|g" gitops/manifests/deployment.yaml

      - name: Commit and push GitOps change
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add gitops/manifests/deployment.yaml
          git commit -m "Release $VERSION - update GitOps image" || echo "No changes to commit"
          git push origin HEAD